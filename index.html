<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Smiling Data Club</title>

    <!-- TODO: Update og:title to match your application name -->
    <meta property="og:title" content="Smiling Data Club" />
    <meta property="og:description" content="Today's complexity. Retro simplicity." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <!-- SVG filters for pixelation effect -->
    <svg style="position:absolute;width:0;height:0" aria-hidden="true">
      <defs>
        <filter id="pixelate" x="0" y="0" width="100%" height="100%">
          <feFlood x="2" y="2" width="6" height="6"/>
          <feComposite width="6" height="6"/>
          <feTile result="a"/>
          <feComposite in="SourceGraphic" in2="a" operator="in"/>
          <feMorphology operator="dilate" radius="3"/>
        </filter>
        <filter id="pixelate-heavy" x="0" y="0" width="100%" height="100%">
          <feFlood x="4" y="4" width="12" height="12"/>
          <feComposite width="12" height="12"/>
          <feTile result="a"/>
          <feComposite in="SourceGraphic" in2="a" operator="in"/>
          <feMorphology operator="dilate" radius="6"/>
        </filter>
      </defs>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
